<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiPoo - Neon Experience</title>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
        .neon-border { border-bottom: 2px solid #f0f; box-shadow: 0 0 15px #f0f; padding: 20px; text-align: center; }
        .main-container { padding: 20px; text-align: center; min-height: 80vh; }
        .btn-action { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 12px 25px; border-radius: 30px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.4s; box-shadow: 0 0 10px #0ff; }
        .btn-action:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid #f0f; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; padding: 15px; cursor: pointer; color: #f0f; font-size: 14px; transition: 0.3s; }
        .nav-item:hover { background: rgba(255, 0, 255, 0.1); color: #fff; }
        #chat-area { margin-top: 20px; background: #111; border-radius: 15px; height: 150px; padding: 10px; border: 1px solid #333; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="neon-border">
        <h1 style="margin:0; letter-spacing: 5px; text-shadow: 0 0 10px #0ff;">RiPoo</h1>
    </div>

    <div class="main-container">
        <h2 style="color: #f0f;">مرحباً بك في مستقبل التعارف 🚀</h2>
        <p>اكتشف أشخاصاً جدد حولك بلمسة نيون ساحرة.</p>
        
        <div id="chat-area">
            <div style="color: #888;">[نظام]: مرحباً بك في RiPoo! جارِ الاتصال بالخادم...</div>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-action" onclick="alert('جارِ فتح الكاميرا للبث المباشر...')">ابدأ البث المباشر 🎥</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">🔥 اكتشف</div>
        <div class="nav-item">💬 دردشة</div>
        <div class="nav-item">📸 صور</div>
        <div class="nav-item">👤 حسابي</div>
    </div>

</body>
          </html>
